<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>שעות פתיחת הספרייה</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
    }

    body {
      direction: rtl;
      text-align: center;
      font-family: "Noto Sans Hebrew", Arial, sans-serif;
      color: #333333;
    }

    .opening-hours {
      box-sizing: border-box;
      width: 100%;
      padding: 12px;
    }

    .opening-hours h1 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      color: #1A5CAD;
    }

    .opening-hours p {
      margin: 5px 0;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <section class="opening-hours">
    <h1>שעות פתיחת הספרייה</h1>

    <p><strong>ימים א׳–ד׳:</strong> 08:00–20:00</p>
    <p><strong>יום ה׳:</strong> 08:00–18:00</p>
  </section>
</body>
</html>
